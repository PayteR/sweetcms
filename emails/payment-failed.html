<!-- Subject: Payment failed for your subscription -->
<div style="font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
  <h2>Payment Failed</h2>
  <p>We were unable to process your payment. Please update your payment method to keep your subscription active.</p>
  <p><a href="{{billingUrl}}" style="display: inline-block; padding: 12px 24px; background: #e91e63; color: white; text-decoration: none; border-radius: 6px;">Update Payment Method</a></p>
  <p style="color: #666; font-size: 14px;">If your payment method has expired, please add a new one.</p>
</div>
